<app-page-header title="Agendar Reunião C+C" subtitle="Marque uma reunião com outro associado" icon="fas fa-calendar-plus" />

<div class="card shadow-sm">
  <div class="card-body">
    <div class="mb-3 position-relative">
      <label class="form-label">Associado <span class="text-danger">*</span></label>
      <div class="input-group">
        <input type="text" class="form-control" [(ngModel)]="buscaAssociado" placeholder="Buscar por nome ou CPF..." />
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()" [disabled]="buscando">
          <i class="fas" [class.fa-search]="!buscando" [class.fa-spinner]="buscando" [class.fa-spin]="buscando"></i>
        </button>
      </div>
      @if (associadosResultado.length > 0) {
        <div class="list-group position-absolute w-100 shadow" style="z-index:1000">
          @for (a of associadosResultado; track a.id) {
            <button type="button" class="list-group-item list-group-item-action" (click)="selecionar(a)">{{ a.nomeCompleto }} &mdash; {{ a.cpf }}</button>
          }
        </div>
      }
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Data e Hora <span class="text-danger">*</span></label>
        <input type="datetime-local" class="form-control" [(ngModel)]="form.dataHora" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Tipo <span class="text-danger">*</span></label>
        <select class="form-select" [(ngModel)]="form.tipo">
          <option value="PRESENCIAL">Presencial</option>
          <option value="ONLINE">Online</option>
        </select>
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary" (click)="salvar()" [disabled]="salvando">
        @if (salvando) { <span class="spinner-border spinner-border-sm me-1"></span> }
        <i class="fas fa-calendar-check me-1"></i>Agendar
      </button>
      <a class="btn btn-outline-secondary" routerLink="/reunioes">Cancelar</a>
    </div>
  </div>
</div>

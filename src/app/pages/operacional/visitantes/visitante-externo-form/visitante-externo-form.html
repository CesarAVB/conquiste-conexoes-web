<app-page-header title="Visitante Externo" subtitle="Cadastro de visitante externo à equipe" icon="fas fa-user-plus" />

<div class="card shadow-sm">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Nome Completo <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="form.nomeCompleto" />
      </div>
      <div class="col-md-6">
        <label class="form-label">CPF <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="form.cpf" maxlength="14" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Telefone</label>
        <input type="text" class="form-control" [(ngModel)]="form.telefone" maxlength="15" />
      </div>
      <div class="col-md-4">
        <label class="form-label">E-mail</label>
        <input type="email" class="form-control" [(ngModel)]="form.email" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Profissão</label>
        <input type="text" class="form-control" [(ngModel)]="form.profissao" />
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary" (click)="salvar()" [disabled]="salvando">
        @if (salvando) { <span class="spinner-border spinner-border-sm me-1"></span> }
        <i class="fas fa-save me-1"></i>Registrar Visita
      </button>
      <a class="btn btn-outline-secondary" routerLink="/visitantes/validacao">Cancelar</a>
    </div>
  </div>
</div>

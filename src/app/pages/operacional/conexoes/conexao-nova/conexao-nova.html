<app-page-header title="Nova Conexão" subtitle="Registre uma indicação de negócio" icon="fas fa-link" />

<div class="card shadow-sm">
  <div class="card-body">
    <div class="mb-3 position-relative">
      <label class="form-label">Enviar para (Associado Receptor) <span class="text-danger">*</span></label>
      <div class="input-group">
        <input type="text" class="form-control" [(ngModel)]="buscaReceptor" placeholder="Buscar por nome ou CPF..." />
        <button class="btn btn-outline-secondary" type="button" (click)="buscar()" [disabled]="buscando">
          <i class="fas" [class.fa-search]="!buscando" [class.fa-spinner]="buscando" [class.fa-spin]="buscando"></i>
        </button>
      </div>
      @if (receptoresResultado.length > 0) {
        <div class="list-group position-absolute w-100 shadow" style="z-index:1000">
          @for (a of receptoresResultado; track a.id) {
            <button type="button" class="list-group-item list-group-item-action" (click)="selecionar(a)">{{ a.nomeCompleto }} &mdash; {{ a.cpf }}</button>
          }
        </div>
      }
    </div>
    <div class="mb-3">
      <label class="form-label">Tipo <span class="text-danger">*</span></label>
      <div class="d-flex gap-2">
        <button type="button" class="btn" [class.btn-danger]="form.tipo === 'QUENTE'" [class.btn-outline-secondary]="form.tipo !== 'QUENTE'" (click)="form.tipo = 'QUENTE'"><i class="fas fa-fire me-1"></i>Quente</button>
        <button type="button" class="btn" [class.btn-warning]="form.tipo === 'MORNA'" [class.btn-outline-secondary]="form.tipo !== 'MORNA'" (click)="form.tipo = 'MORNA'">Morna</button>
        <button type="button" class="btn" [class.btn-info]="form.tipo === 'FRIA'" [class.btn-outline-secondary]="form.tipo !== 'FRIA'" (click)="form.tipo = 'FRIA'"><i class="fas fa-snowflake me-1"></i>Fria</button>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Nome do Contato <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="form.nomeContato" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Telefone do Contato</label>
        <input type="text" class="form-control" [(ngModel)]="form.telefoneContato" maxlength="15" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Empresa do Contato</label>
        <input type="text" class="form-control" [(ngModel)]="form.empresaContato" />
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary" (click)="salvar()" [disabled]="salvando">
        @if (salvando) { <span class="spinner-border spinner-border-sm me-1"></span> }
        <i class="fas fa-paper-plane me-1"></i>Enviar Conexão
      </button>
      <a class="btn btn-outline-secondary" routerLink="/conexoes">Cancelar</a>
    </div>
  </div>
</div>

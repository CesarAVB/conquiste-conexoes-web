<div class="dash-header">
  <div>
    <h4 class="dash-title">Dashboard</h4>
    <p class="dash-subtitle">Bem-vindo ao sistema Conquiste + Conexões</p>
  </div>
</div>

<!-- Stat cards -->
<div class="dash-stats">
  <div class="dash-stat">
    <div class="dash-stat__icon dash-stat__icon--blue">
      <i class="fas fa-users"></i>
    </div>
    <div class="dash-stat__body">
      <span class="dash-stat__label">Associados</span>
      <span class="dash-stat__hint">Gerencie os membros</span>
    </div>
    <a routerLink="/associados" class="dash-stat__link"><i class="fas fa-arrow-right"></i></a>
  </div>

  <div class="dash-stat">
    <div class="dash-stat__icon dash-stat__icon--green">
      <i class="fas fa-people-group"></i>
    </div>
    <div class="dash-stat__body">
      <span class="dash-stat__label">Equipes</span>
      <span class="dash-stat__hint">Gerencie as equipes</span>
    </div>
    <a routerLink="/equipes" class="dash-stat__link"><i class="fas fa-arrow-right"></i></a>
  </div>

  <div class="dash-stat">
    <div class="dash-stat__icon dash-stat__icon--purple">
      <i class="fas fa-layer-group"></i>
    </div>
    <div class="dash-stat__body">
      <span class="dash-stat__label">Clusters</span>
      <span class="dash-stat__hint">Gerencie os clusters</span>
    </div>
    <a routerLink="/admin/clusters" class="dash-stat__link"><i class="fas fa-arrow-right"></i></a>
  </div>

  <div class="dash-stat">
    <div class="dash-stat__icon dash-stat__icon--amber">
      <i class="fas fa-cogs"></i>
    </div>
    <div class="dash-stat__body">
      <span class="dash-stat__label">Administração</span>
      <span class="dash-stat__hint">Configurações gerais</span>
    </div>
    <a routerLink="/admin/clusters" class="dash-stat__link"><i class="fas fa-arrow-right"></i></a>
  </div>
</div>

<!-- Shortcuts -->
<div class="dash-section">
  <h6 class="dash-section__title">Acesso rápido</h6>
  <div class="dash-shortcuts">
    <a routerLink="/operacional/reunioes" class="dash-shortcut">
      <i class="fas fa-calendar-days"></i>
      <span>Reuniões</span>
    </a>
    <a routerLink="/operacional/conexoes/nova" class="dash-shortcut">
      <i class="fas fa-handshake"></i>
      <span>Nova Conexão</span>
    </a>
    <a routerLink="/operacional/visitantes/externo" class="dash-shortcut">
      <i class="fas fa-user-plus"></i>
      <span>Visitante</span>
    </a>
    <a routerLink="/operacional/parcerias/nova" class="dash-shortcut">
      <i class="fas fa-briefcase"></i>
      <span>Nova Parceria</span>
    </a>
    <a routerLink="/paineis/semanal" class="dash-shortcut">
      <i class="fas fa-chart-bar"></i>
      <span>Painel Semanal</span>
    </a>
    <a routerLink="/relatorios/presenca" class="dash-shortcut">
      <i class="fas fa-file-lines"></i>
      <span>Relatório Presença</span>
    </a>
    <a routerLink="/educacional/peen" class="dash-shortcut">
      <i class="fas fa-graduation-cap"></i>
      <span>PEEN</span>
    </a>
    <a routerLink="/educacional/teen" class="dash-shortcut">
      <i class="fas fa-star"></i>
      <span>TEEN</span>
    </a>
  </div>
</div>

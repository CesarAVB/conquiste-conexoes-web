<app-page-header [title]="isEdit ? 'Editar Horário' : 'Novo Horário'" icon="fas fa-clock"></app-page-header>

<div class="card shadow-sm">
  <div class="card-body">
    <form (ngSubmit)="salvar()">
      <div class="mb-3">
        <label class="form-label">Horário <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="descricao" name="descricao"
               placeholder="Ex: 07:00" maxlength="10" required>
        <small class="text-muted">Formato: HH:mm</small>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-cc-primary" [disabled]="loading">
          @if (loading) { <span class="spinner-border spinner-border-sm me-1"></span> Salvando... }
          @else { <i class="fas fa-save me-1"></i> Salvar }
        </button>
        <a routerLink="/admin/horarios" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i> Voltar</a>
      </div>
    </form>
  </div>
</div>

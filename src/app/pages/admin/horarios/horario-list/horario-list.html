<app-page-header title="Horários de Reunião" icon="fas fa-clock"
  btnLabel="Novo Horário" btnRoute="/admin/horarios/novo">
</app-page-header>

@if (loading) {
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
} @else if (horarios.length === 0) {
  <div class="alert alert-info"><i class="fas fa-info-circle me-1"></i> Nenhum horário cadastrado.</div>
} @else {
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>ID</th><th>Descrição</th><th>Status</th><th class="text-end">Ações</th></tr>
        </thead>
        <tbody>
          @for (h of horarios; track h.id) {
            <tr>
              <td>{{ h.id }}</td>
              <td><i class="fas fa-clock me-1 text-muted"></i> {{ h.descricao }}</td>
              <td><span class="badge" [class.bg-success]="h.ativo" [class.bg-secondary]="!h.ativo">{{ h.ativo ? 'Ativo' : 'Inativo' }}</span></td>
              <td class="text-end">
                <a [routerLink]="['/admin/horarios/editar', h.id]" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                <button class="btn btn-outline-danger btn-sm" (click)="confirmarInativar(h)"><i class="fas fa-ban"></i></button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<app-confirm-dialog [visible]="confirmVisible" title="Inativar Horário"
  [message]="'Deseja inativar: ' + (selectedItem?.descricao || '') + '?'"
  (confirmed)="inativar()" (cancelled)="cancelar()">
</app-confirm-dialog>

<app-page-header [title]="isEdit ? 'Editar Grupamento' : 'Novo Grupamento'" icon="fas fa-object-group"></app-page-header>

<div class="card shadow-sm">
  <div class="card-body">
    <form (ngSubmit)="salvar()">
      <div class="row">
        <div class="col-md-8 mb-3">
          <label class="form-label">Nome <span class="text-danger">*</span></label>
          <input type="text" class="form-control" [(ngModel)]="nome" name="nome"
                 placeholder="Ex: Construção Civil" maxlength="100" required>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label">Sigla (4 caracteres) <span class="text-danger">*</span></label>
          <input type="text" class="form-control text-uppercase" [(ngModel)]="sigla" name="sigla"
                 placeholder="Ex: CIVL" maxlength="4" minlength="4" required>
          <small class="text-muted">{{ sigla.length }}/4</small>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-cc-primary" [disabled]="loading">
          @if (loading) { <span class="spinner-border spinner-border-sm me-1"></span> Salvando... }
          @else { <i class="fas fa-save me-1"></i> Salvar }
        </button>
        <a routerLink="/admin/grupamentos" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i> Voltar</a>
      </div>
    </form>
  </div>
</div>

<app-page-header title="Grupamentos Estratégicos" icon="fas fa-object-group"
  btnLabel="Novo Grupamento" btnRoute="/admin/grupamentos/novo">
</app-page-header>

@if (loading) {
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
} @else if (grupamentos.length === 0) {
  <div class="alert alert-info"><i class="fas fa-info-circle me-1"></i> Nenhum grupamento cadastrado.</div>
} @else {
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>ID</th><th>Nome</th><th>Sigla</th><th>Status</th><th class="text-end">Ações</th></tr>
        </thead>
        <tbody>
          @for (g of grupamentos; track g.id) {
            <tr>
              <td>{{ g.id }}</td>
              <td>{{ g.nome }}</td>
              <td><span class="badge bg-info text-dark">{{ g.sigla }}</span></td>
              <td><span class="badge" [class.bg-success]="g.ativo" [class.bg-secondary]="!g.ativo">{{ g.ativo ? 'Ativo' : 'Inativo' }}</span></td>
              <td class="text-end">
                <a [routerLink]="['/admin/grupamentos/editar', g.id]" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                <button class="btn btn-outline-danger btn-sm" (click)="confirmarInativar(g)"><i class="fas fa-ban"></i></button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<app-confirm-dialog [visible]="confirmVisible" title="Inativar Grupamento"
  [message]="'Deseja inativar: ' + (selectedItem?.nome || '') + '?'"
  (confirmed)="inativar()" (cancelled)="cancelar()">
</app-confirm-dialog>

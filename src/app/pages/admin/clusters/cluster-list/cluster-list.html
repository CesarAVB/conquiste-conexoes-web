<!-- src/app/pages/admin/clusters/cluster-list/cluster-list.html -->
<app-page-header
  title="Clusters"
  subtitle="Setores de Mercado"
  icon="fas fa-layer-group"
  btnLabel="Novo Cluster"
  btnRoute="/admin/clusters/novo">
</app-page-header>

@if (loading) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Carregando...</span>
    </div>
  </div>
} @else if (clusters.length === 0) {
  <div class="alert alert-info">
    <i class="fas fa-info-circle me-1"></i> Nenhum cluster cadastrado.
  </div>
} @else {
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Status</th>
            <th class="text-end">Ações</th>
          </tr>
        </thead>
        <tbody>
          @for (cluster of clusters; track cluster.id) {
            <tr>
              <td>{{ cluster.id }}</td>
              <td>{{ cluster.nome }}</td>
              <td>
                @if (cluster.ativo) {
                  <span class="badge bg-success">Ativo</span>
                } @else {
                  <span class="badge bg-secondary">Inativo</span>
                }
              </td>
              <td class="text-end">
                <a [routerLink]="['/admin/clusters/editar', cluster.id]"
                   class="btn btn-outline-primary btn-sm me-1">
                  <i class="fas fa-edit"></i>
                </a>
                <button class="btn btn-outline-danger btn-sm"
                        (click)="confirmarInativar(cluster)">
                  <i class="fas fa-ban"></i>
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<app-confirm-dialog
  [visible]="confirmVisible"
  title="Inativar Cluster"
  [message]="'Deseja inativar o cluster: ' + (selectedCluster?.nome || '') + '?'"
  (confirmed)="inativar()"
  (cancelled)="cancelar()">
</app-confirm-dialog>

<!-- src/app/pages/admin/clusters/cluster-form/cluster-form.html -->
<app-page-header
  [title]="isEdit ? 'Editar Cluster' : 'Novo Cluster'"
  icon="fas fa-layer-group">
</app-page-header>

<div class="card shadow-sm">
  <div class="card-body">
    <form (ngSubmit)="salvar()">
      <div class="mb-3">
        <label class="form-label">Nome do Cluster <span class="text-danger">*</span></label>
        <input type="text" class="form-control" [(ngModel)]="nome" name="nome"
               placeholder="Ex: Saúde & Bem-Estar" maxlength="100" required>
        <small class="text-muted">{{ nome.length }}/100 caracteres</small>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-cc-primary" [disabled]="loading">
          @if (loading) {
            <span class="spinner-border spinner-border-sm me-1"></span> Salvando...
          } @else {
            <i class="fas fa-save me-1"></i> Salvar
          }
        </button>

        <a routerLink="/admin/clusters" class="btn btn-outline-secondary">
          <i class="fas fa-arrow-left me-1"></i> Voltar
        </a>
      </div>
    </form>
  </div>
</div>

<app-page-header title="Parametrização de Pontuação" subtitle="Faixas de associados → pontos"
  icon="fas fa-star" btnLabel="Nova Faixa" btnRoute="/admin/parametrizacao/novo">
</app-page-header>

@if (loading) {
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
} @else if (faixas.length === 0) {
  <div class="alert alert-info"><i class="fas fa-info-circle me-1"></i> Nenhuma faixa cadastrada.</div>
} @else {
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>ID</th><th>Faixa Mínima</th><th>Faixa Máxima</th><th>Pontuação</th><th class="text-end">Ações</th></tr>
        </thead>
        <tbody>
          @for (f of faixas; track f.id) {
            <tr>
              <td>{{ f.id }}</td>
              <td>{{ f.faixaMinima }} associados</td>
              <td>{{ f.faixaMaxima }} associados</td>
              <td><span class="badge bg-warning text-dark"><i class="fas fa-star me-1"></i>{{ f.pontuacao }} pts</span></td>
              <td class="text-end">
                <a [routerLink]="['/admin/parametrizacao/editar', f.id]" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                <button class="btn btn-outline-danger btn-sm" (click)="confirmarExcluir(f)"><i class="fas fa-trash"></i></button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<app-confirm-dialog [visible]="confirmVisible" title="Excluir Faixa"
  message="Deseja excluir esta faixa de pontuação?"
  (confirmed)="excluir()" (cancelled)="cancelar()">
</app-confirm-dialog>

<app-page-header title="Cargos de Liderança" icon="fas fa-user-tag"
  btnLabel="Novo Cargo" btnRoute="/admin/cargos/novo">
</app-page-header>

@if (loading) {
  <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
} @else if (cargos.length === 0) {
  <div class="alert alert-info"><i class="fas fa-info-circle me-1"></i> Nenhum cargo cadastrado.</div>
} @else {
  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead class="table-light">
          <tr><th>ID</th><th>Nome</th><th>Classificação</th><th>Status</th><th class="text-end">Ações</th></tr>
        </thead>
        <tbody>
          @for (c of cargos; track c.id) {
            <tr>
              <td>{{ c.id }}</td>
              <td>{{ c.nome }}</td>
              <td>
                <span class="badge" [class.bg-primary]="c.classificacao === 'NORMAL'" [class.bg-warning]="c.classificacao === 'ISENTO'">
                  {{ c.classificacao }}
                </span>
              </td>
              <td><span class="badge" [class.bg-success]="c.ativo" [class.bg-secondary]="!c.ativo">{{ c.ativo ? 'Ativo' : 'Inativo' }}</span></td>
              <td class="text-end">
                <a [routerLink]="['/admin/cargos/editar', c.id]" class="btn btn-outline-primary btn-sm me-1"><i class="fas fa-edit"></i></a>
                <button class="btn btn-outline-danger btn-sm" (click)="confirmarInativar(c)"><i class="fas fa-ban"></i></button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
}

<app-confirm-dialog [visible]="confirmVisible" title="Inativar Cargo"
  [message]="'Deseja inativar: ' + (selectedItem?.nome || '') + '?'"
  (confirmed)="inativar()" (cancelled)="cancelar()">
</app-confirm-dialog>

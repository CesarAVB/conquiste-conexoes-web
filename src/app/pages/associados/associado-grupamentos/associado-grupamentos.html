<!-- src/app/pages/associados/associado-grupamentos/associado-grupamentos.html -->
@if (loading) {
  <app-loading-spinner></app-loading-spinner>
} @else {
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h6 class="mb-0"><i class="fas fa-tags me-1"></i> Grupamentos</h6>
  </div>

  <!-- Vincular -->
  <div class="input-group mb-3">
    <select class="form-select" [(ngModel)]="grupamentoSelecionado" name="grupamento">
      <option value="">Selecione um grupamento para vincular...</option>
      @for (g of grupamentosDisponiveis(); track g.id) {
        <option [value]="g.id">{{ g.nome }} ({{ g.sigla }})</option>
      }
    </select>
    <button class="btn btn-cc-primary" (click)="vincular()" [disabled]="!grupamentoSelecionado || loadingVincular">
      @if (loadingVincular) { <span class="spinner-border spinner-border-sm"></span> } @else { <i class="fas fa-plus"></i> }
    </button>
  </div>

  @if (vinculos.length === 0) {
    <div class="alert alert-info"><i class="fas fa-info-circle me-1"></i> Nenhum grupamento vinculado.</div>
  } @else {
    <div class="d-flex flex-wrap gap-2">
      @for (v of vinculos; track v.id) {
        <span class="badge bg-primary fs-6 d-flex align-items-center gap-1">
          {{ v.grupamentoSigla }} &mdash; {{ v.grupamentoNome }}
          <button type="button" class="btn-close btn-close-white btn-sm ms-1"
                  (click)="confirmarDesvincular(v)" aria-label="Remover"></button>
        </span>
      }
    </div>
  }

  <app-confirm-dialog
    [visible]="confirmVisible"
    title="Desvincular Grupamento"
    [message]="'Deseja desvincular o grupamento: ' + (selecionado?.grupamentoNome || '') + '?'"
    (confirmed)="desvincular()"
    (cancelled)="cancelar()">
  </app-confirm-dialog>
}

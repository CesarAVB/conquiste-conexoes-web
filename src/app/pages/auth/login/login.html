<div class="login-container">
  <div class="login-card">

    <div class="login-header">
      <div class="login-logo">
        <i class="fas fa-handshake"></i>
      </div>
      <div class="login-brand">
        <h1 class="login-title">Conquiste + Conexões</h1>
        <p class="login-subtitle">Acesse sua conta para continuar</p>
      </div>
    </div>

    @if (error) {
      <div class="login-alert">
        <i class="fas fa-exclamation-circle"></i>
        <span>{{ error }}</span>
        <button class="login-alert-close" (click)="error = ''" aria-label="Fechar">
          <i class="fas fa-times"></i>
        </button>
      </div>
    }

    <form class="login-form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input id="email" type="email" class="form-input" [(ngModel)]="email" name="email"
                 placeholder="seu@email.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="senha">Senha</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input id="senha" type="password" class="form-input" [(ngModel)]="senha" name="senha"
                 placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="login-btn" [disabled]="loading">
        @if (loading) {
          <span class="login-spinner"></span> Entrando...
        } @else {
          <i class="fas fa-arrow-right-to-bracket"></i> Entrar
        }
      </button>
    </form>

    <div class="login-footer">
      <small>
        &copy; 2026
        <a href="https://portfolio.cesaraugusto.dev.br/" target="_blank" rel="noopener noreferrer">
          César Augusto Vieira Bezerra
        </a>. Todos os direitos reservados.
      </small>
    </div>

  </div>
</div>

<aside class="sidebar" [class.sidebar--open]="isOpen">

  <!-- Brand -->
  <div class="sidebar__brand">
    <div class="sidebar__logo">
      <i class="fas fa-handshake"></i>
    </div>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-name">C+C</span>
      <span class="sidebar__brand-sub">Conquiste Conexões</span>
    </div>
  </div>

  <!-- Nav -->
  <nav class="sidebar__nav">
    @for (item of menuItems; track item.label) {
      @if (item.children) {
        <div class="sidebar__group">
          <button class="sidebar__item sidebar__item--parent" (click)="toggleSubmenu(item)">
            <span class="sidebar__item-icon"><i [class]="item.icon"></i></span>
            <span class="sidebar__item-label">{{ item.label }}</span>
            <i class="fas fa-chevron-right sidebar__chevron" [class.sidebar__chevron--open]="item.expanded"></i>
          </button>
          @if (item.expanded) {
            <div class="sidebar__submenu">
              @for (child of item.children; track child.label) {
                <a class="sidebar__item sidebar__item--child" [routerLink]="child.route" routerLinkActive="sidebar__item--active">
                  <span class="sidebar__item-icon"><i [class]="child.icon"></i></span>
                  <span class="sidebar__item-label">{{ child.label }}</span>
                </a>
              }
            </div>
          }
        </div>
      } @else {
        <a class="sidebar__item" [routerLink]="item.route" routerLinkActive="sidebar__item--active" [routerLinkActiveOptions]="{exact: true}">
          <span class="sidebar__item-icon"><i [class]="item.icon"></i></span>
          <span class="sidebar__item-label">{{ item.label }}</span>
        </a>
      }
    }
  </nav>

</aside>

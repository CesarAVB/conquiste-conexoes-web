<header class="app-header" [class.sidebar-closed]="!sidebarOpen">
  <button class="app-header__toggle" (click)="onToggleSidebar()" aria-label="Alternar menu">
    <i class="fas fa-bars"></i>
  </button>

  <div class="app-header__spacer"></div>

  <div class="app-header__user">
    <div class="app-header__avatar" [title]="authService.getUser()?.nome ?? ''">
      {{ getInitials() }}
    </div>
    <div class="app-header__user-info">
      <span class="app-header__user-name">{{ authService.getUser()?.nome }}</span>
      <span class="app-header__user-role">{{ authService.getUser()?.role }}</span>
    </div>
    <button class="app-header__logout" (click)="logout()" title="Sair">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>
</header>
